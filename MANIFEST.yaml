# ============================================================
# OpenELIS Design Workspace — Manifest
# ============================================================
# This file is the single source of truth for every artifact
# in the repo. Claude auto-updates it when processing uploads.
#
# Schema per entry:
#   id:          unique slug (usually filename without extension)
#   type:        mockup | spec | requirements-doc | research-doc |
#                vendor-manual | reference-data | image |
#                chat-transcript | meeting-notes | decision
#   path:        repo-relative file path
#   category:    admin-config | analyzer-integration | microbiology |
#                nce | pathology | quality | results-validation |
#                system | other
#   description: short human-readable summary
#   paired_with: id of the companion file (e.g. mockup ↔ spec)
#   links:       linked external objects
#     jira:      list of Jira ticket keys
#     figma:     list of Figma URLs
#     confluence: list of Confluence page URLs
#     transcripts: list of transcript ids in this manifest
#     meetings:  list of meeting-notes ids in this manifest
#     decisions: list of decision ids in this manifest
#     other:     list of freeform URLs or references
#   added:       ISO date when first added to the repo
#   updated:     ISO date of last significant change
# ============================================================

